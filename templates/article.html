<!-- Template for single article page -->

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>{{ article.title }}</title>
    </head>

    <body style="font-family: sans-serif; max-width: 600px; margin: 40px auto;">
        
        <h1>{{ article.title }}</h1>
        <p style="color: gray">Published on: {{ article.date }}</p>

        <hr>

        <p>{{ article.content }}</p>

    </body>
</html>
