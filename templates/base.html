<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Personal Blog</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="comic-container">
        
        <div class="header-row">
            <h1>Personal Blog</h1>
            <div>
                {% if is_admin %}
                    <a href="/home" style="margin-right: 15px;">Home</a>
                    <a href="/new" style="margin-right: 15px;">+ Add</a>
                    <a href="/logout" class="secondary-action" style="color: black;">Logout</a>
                {% else %}
                    <a href="/home" style="margin-right: 15px;">Home</a>
                    <a href="/login" class="secondary-action" style="color: black;">Admin Login</a>
                {% endif %}
            </div>
        </div>
        
        <hr>

        {% block content %}
        {% endblock %}

    </div>

</body>
</html>
