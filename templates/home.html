<!-- Template for home page to display all accessible articles -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Personal Blog</title>
</head>
<body style="font-family: sans-serif; max-width: 600px; margin: 40px auto;">

    <h1>Personal Blog</h1>
    <hr>
    
    <ul style="list-style-type: none; padding: 0;">
        
        {% for article in articles %}
            
            <li style="margin-bottom: 15px; display: flex; justify-content: space-between;">
                
                <a href="/article/{{ article.id }}" style="text-decoration: none; color: black; font-weight: bold;">
                    {{ article.title }}
                </a>
                
                <span style="color: gray;">{{ article.date }}</span>
                
            </li>
            
        {% else %}
            <p>No articles found. Time to write something!</p>
        {% endfor %}
        
    </ul>

</body>
</html>
