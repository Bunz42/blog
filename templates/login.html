<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Admin Login</title>
    </head>

    <body style="font-family: sans-serif; max-width: 400px; margin: 80px auto; text-align: center;">

        <h1>Admin Login</h1>

        {% if error %}
            <p style="color: red; font-weight: bold;">{{ error }}</p>
        {% endif %}

        <form action="/login" method="POST" style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
            <input type="text" name="username" placeholder="Username" required style="padding: 10px; font-size: 16px;">
            <input type="password" name="password" placeholder="Password" required style="padding: 10px; font-size: 16px;">

            <button type="submit" style="padding: 10px; font-size: 16px; cursor: pointer;">Login</button>
        </form>
    </body>
</html>
