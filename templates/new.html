<!-- Template for the page for article creation by the admin -->

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>New Article</title>
    </head>

    <body style="font-family: sans-serif; max-width: 600px; margin: 40px auto;">
        
        <h1>New Article</h1>
        <hr>

        <form action="/new" method="POST" style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px">
            
            <input type="text" name="title" placeholder="Article Title" required style="padding: 10px; font-size: 16px;">
            <input type="text" name="date" placeholder="Publishing Date" required style="padding: 10px; font-size: 16px;">

            <textarea name="content" placeholder="Content" rows="10" required style="padding: 10px; font-size: 16px;"></textarea>
            <button type="submit" style="padding: 10px; font-size: 16px; cursor: pointer; width: 100px;">Publish</button>

        </form>
    </body>
 </html>
